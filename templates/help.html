<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help — PY-AUTOMATE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { padding-bottom: 0; }

        .help-header {
            background:    var(--surface);
            border-bottom: 1px solid var(--border);
            padding:       0 32px;
            height:        56px;
            display:       flex;
            align-items:   center;
            gap:           16px;
            position:      sticky;
            top:           0;
            z-index:       10;
        }
        .help-logo {
            font-family:    var(--mono);
            font-size:      14px;
            font-weight:    700;
            letter-spacing: 0.08em;
            color:          var(--text-primary);
            text-transform: uppercase;
        }
        .help-logo span { color: var(--accent); }
        .help-title {
            font-size:   13px;
            color:       var(--text-dim);
            padding-left:16px;
            border-left: 1px solid var(--border);
        }

        .help-body {
            max-width:  820px;
            margin:     0 auto;
            padding:    48px 32px 80px;
        }

        /* ── Markdown prose styles ─────────────────────────────── */

        .prose h1 {
            font-family:    var(--mono);
            font-size:      22px;
            font-weight:    700;
            color:          var(--text-primary);
            margin:         0 0 8px;
            letter-spacing: 0.04em;
        }
        .prose h1 + p {
            font-size:   14px;
            color:       var(--text-secondary);
            margin-top:  0;
            margin-bottom: 32px;
        }
        .prose h2 {
            font-family:   var(--sans);
            font-size:     17px;
            font-weight:   700;
            color:         var(--text-primary);
            margin:        40px 0 12px;
            padding-bottom:8px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .prose h3 {
            font-family: var(--sans);
            font-size:   14px;
            font-weight: 600;
            color:       var(--accent);
            margin:      28px 0 8px;
        }
        .prose p {
            font-size:   14px;
            line-height: 1.7;
            color:       var(--text-secondary);
            margin:      0 0 12px;
        }
        .prose a { color: var(--accent); }
        .prose strong { color: var(--text-primary); font-weight: 600; }
        .prose ul, .prose ol {
            font-size:   14px;
            line-height: 1.7;
            color:       var(--text-secondary);
            margin:      0 0 12px;
            padding-left:24px;
        }
        .prose li { margin-bottom: 4px; }
        .prose hr {
            border:     none;
            border-top: 1px solid var(--border-subtle);
            margin:     32px 0;
        }
        .prose code {
            font-family:      var(--mono);
            font-size:        12px;
            background:       var(--surface-2);
            border:           1px solid var(--border-subtle);
            border-radius:    4px;
            padding:          1px 5px;
            color:            var(--text-primary);
        }
        .prose pre {
            background:    var(--surface-2);
            border:        1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding:       16px 20px;
            overflow-x:    auto;
            margin:        0 0 16px;
        }
        .prose pre code {
            background:  none;
            border:      none;
            padding:     0;
            font-size:   13px;
            line-height: 1.6;
            color:       var(--text-secondary);
        }
        .prose table {
            width:           100%;
            border-collapse: collapse;
            font-size:       13px;
            margin:          0 0 16px;
        }
        .prose th {
            text-align:    left;
            font-family:   var(--sans);
            font-size:     11px;
            font-weight:   600;
            color:         var(--text-dim);
            text-transform:uppercase;
            letter-spacing:0.05em;
            padding:       6px 12px;
            border-bottom: 1px solid var(--border);
        }
        .prose td {
            padding:       8px 12px;
            border-bottom: 1px solid var(--border-subtle);
            color:         var(--text-secondary);
            vertical-align:top;
        }
        .prose td code { font-size: 12px; }
        .prose tr:last-child td { border-bottom: none; }
    </style>
</head>
<body>
    <div class="help-header">
        <div class="help-logo">PY<span>·</span>AUTOMATE</div>
        <div class="help-title">Documentation</div>
    </div>

    <div class="help-body">
        <div class="prose" id="content">
            <p style="color:var(--text-dim);font-size:13px">Loading…</p>
        </div>
    </div>

    <script>
        fetch('/readme')
            .then(r => r.text())
            .then(md => {
                document.getElementById('content').innerHTML = marked.parse(md);
            })
            .catch(() => {
                document.getElementById('content').innerHTML =
                    '<p style="color:var(--danger)">Could not load documentation.</p>';
            });
    </script>
</body>
</html>
