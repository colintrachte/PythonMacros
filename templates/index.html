<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PY-AUTOMATE</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <!-- ── Header ──────────────────────────────────────────────────── -->
    <header>
        <div class="header-left">
            <div class="logo">PY<span>·</span>AUTOMATE</div>

            <!-- Choose Plugins anchor -->
            <div class="choose-plugins-wrap" id="choosePluginsWrap">
                <button class="choose-plugins-btn" id="choosePluginsBtn"
                        title="Choose which plugins are active in this session">
                    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"/>
                    </svg>
                    <span>Plugins</span>
                    <span class="choose-plugins-badge" id="choosePluginsBadge" style="display:none"></span>
                    <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>

                <div class="choose-plugins-panel" id="choosePluginsPanel">
                    <div class="plugin-search-wrap">
                        <input class="plugin-search" id="chooseSearch" type="text"
                               placeholder="Search plugins…" autocomplete="off">
                    </div>
                    <div class="tag-bar" id="chooseTagBar" style="display:none"></div>
                    <ul class="plugin-list choose-list" id="chooseList"></ul>
                    <div class="choose-footer">
                        <span class="choose-count" id="chooseCount">All available</span>
                        <button class="tb-btn tb-btn-xs" id="clearChooseBtn">Clear</button>
                        <div style="flex:1"></div>
                        <button class="tb-btn tb-btn-xs" id="openPluginsFolderBtn" title="Open plugins folder in file explorer">
                            <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
                            </svg>
                        </button>
                        <button class="tb-btn tb-btn-xs new-plugin-trigger" id="newPluginTrigger">
                            <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 4v16m8-8H4"/>
                            </svg>
                            New Plugin
                        </button>
                    </div>
                </div>
            </div>

            <!-- Help -->
            <a class="help-btn" href="/help" target="_blank" title="Documentation">?</a>

            <!-- Settings anchor -->
            <div class="settings-wrap" id="settingsWrap">
                <button class="settings-btn" id="settingsBtn" title="Settings">
                    <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </button>
                <div class="settings-panel" id="settingsPanel">
                    <div class="settings-title">Settings</div>
                    <div class="settings-body" id="settingsBody">
                        <div class="settings-loading">Loading…</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="header-right">
            <button class="run-btn" id="playAll" title="Run pipeline on all loaded files (Ctrl+Enter)">
                <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                Run
            </button>
        </div>
    </header>

    <!-- ── Toolbar strip ───────────────────────────────────────────── -->
    <div class="toolbar-strip">
        <!-- History -->
        <button class="tb-btn" id="undoBtn" title="Undo (Ctrl+Z)" disabled>
            <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 10h10a8 8 0 018 8v2M3 10l5 5m-5-5l5-5"/>
            </svg>
            Undo
        </button>
        <button class="tb-btn" id="redoBtn" title="Redo (Ctrl+Y)" disabled>
            <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                 style="transform:scaleX(-1)">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 10h10a8 8 0 018 8v2M3 10l5 5m-5-5l5-5"/>
            </svg>
            Redo
        </button>

        <div class="tb-section-divider"></div>

        <!-- Import (file/folder picker) -->
        <div class="import-wrap" id="importWrap">
            <button class="tb-btn import-btn" id="importBtn" title="Import files or a folder">
                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                Import
                <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>
            <div class="import-dropdown" id="importDropdown">
                <button class="import-option" id="importFilesOpt">
                    <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    Files
                </button>
                <button class="import-option" id="importFolderOpt">
                    <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
                    </svg>
                    Folder
                </button>
            </div>
            <input type="file" id="filePicker" multiple style="display:none">
            <input type="file" id="folderPicker" webkitdirectory multiple style="display:none">
        </div>
        <span class="tb-file-display" id="fileDisplay"></span>

        <div class="tb-section-divider"></div>

        <!-- Export dropdown -->
        <div class="import-wrap" id="exportWrap">
            <button class="tb-btn import-btn" id="exportBtn" title="Export output (Ctrl+S)" disabled>
                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                </svg>
                Export
                <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>
            <div class="import-dropdown" id="exportDropdown">
                <button class="import-option" id="exportSaveOpt">
                    <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    Save
                </button>
                <button class="import-option" id="exportSaveAsOpt">
                    <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4M12 4v8"/>
                    </svg>
                    Save As…
                </button>
            </div>
        </div>
        <span class="output-filename" id="outputFilename"></span>
    </div>

    <!-- ── Batch strip ───────────────────────────────────────────────── -->
    <div class="batch-strip" id="batchStrip" style="display:none">
        <!-- Large-batch warning -->
        <div class="batch-warn" id="batchWarn" style="display:none">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0;color:var(--warning)">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            </svg>
            <span id="batchWarnText"></span>
            <div style="flex:1"></div>
            <button class="tb-btn tb-btn-xs" id="batchWarnCancel">Cancel</button>
            <button class="batch-continue-btn" id="batchWarnContinue">Continue Upload</button>
        </div>
        <!-- Upload progress -->
        <div class="batch-progress" id="batchProgress" style="display:none">
            <span id="batchProgressText">Uploading…</span>
            <div class="upload-bar"><div class="upload-bar-fill" id="uploadBarFill" style="width:0%"></div></div>
            <span id="batchProgressCount"></span>
            <button class="tb-btn tb-btn-xs" id="batchAbortBtn">Abort</button>
        </div>
    </div>

    <!-- ── Main ────────────────────────────────────────────────────── -->
    <main>
        <div class="main-inner">
            <div class="section-header">
                <span class="section-title">Processing Steps</span>
                <div class="preset-bar">
                    <span class="preset-bar-label">Workflow</span>
                    <button class="tb-btn tb-btn-xs" id="presetLibraryBtn" title="Browse saved workflows">
                        <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                        </svg>
                        Library
                    </button>
                    <div class="btn-divider"></div>
                    <button class="tb-btn tb-btn-xs" id="savePresetBtn" title="Save this pipeline as a workflow (Ctrl+P)">
                        <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                        </svg>
                        Save
                    </button>
                    <button class="tb-btn tb-btn-xs" id="savePresetAsBtn" title="Save pipeline as a new workflow name">
                        <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                        Save As
                    </button>
                    <button class="tb-btn tb-btn-xs" id="loadPresetBtn" title="Load a saved workflow">
                        <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                        </svg>
                        Load
                    </button>
                    <input type="file" id="presetFilePicker" accept=".json" style="display:none">
                    <div class="saveas-bar" id="presetSaveAsBar">
                        <input class="saveas-input" id="presetSaveAsInput" type="text" placeholder="my_workflow.json">
                        <button class="saveas-confirm" id="presetSaveAsConfirm">Save</button>
                        <button class="saveas-cancel"  id="presetSaveAsCancel">Cancel</button>
                    </div>
                    <span class="preset-filename" id="presetFilename">unsaved</span>
                </div>
            </div>
            <div class="section-hint" style="margin-bottom:12px">Drag to reorder · uncheck to skip</div>

            <ul id="scriptList"></ul>

            <div id="emptyState" class="empty-state">
                <div class="empty-state-icon">⬡</div>
                No steps yet. Add a plugin below to begin.
            </div>

            <!-- Add step + inline plugin dropdown -->
            <div class="add-step-wrap">
                <button id="add-global-step">
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 4v16m8-8H4"/>
                    </svg>
                    <span id="addStepLabel">Add Processing Step</span>
                </button>

                <div class="plugin-dropdown" id="pluginDropdown">
                    <div class="plugin-search-wrap">
                        <input class="plugin-search" id="pluginSearch" type="text"
                               placeholder="Search plugins…" autocomplete="off">
                    </div>
                    <div class="tag-bar" id="tagBar" style="display:none"></div>
                    <ul class="plugin-list" id="pluginList"></ul>
                </div>
            </div>
        </div>
    </main>

    <!-- ── Preset Library Modal ────────────────────────────────────── -->
    <div class="modal-overlay" id="presetLibraryOverlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Preset Library</span>
                <div class="modal-header-right">
                    <select class="modal-sort" id="presetSortSelect">
                        <option value="uses">Most Used</option>
                        <option value="success_rate">Best Success Rate</option>
                        <option value="last_used">Recently Used</option>
                        <option value="name">Name</option>
                    </select>
                    <button class="modal-close" id="presetLibraryClose" title="Close">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="modal-body" id="presetLibraryBody"></div>
        </div>
    </div>


    <!-- ── Rename Modal ────────────────────────────────────────────── -->
    <div class="modal-overlay" id="renameModal">
        <div class="modal modal-sm">
            <div class="modal-header">
                <span class="modal-title" id="renameModalTitle">Long filename detected</span>
                <button class="modal-close" id="renameModalClose" title="Keep original">
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body rename-modal-body" id="renameModalBody"></div>
        </div>
    </div>

    <!-- ── Console ─────────────────────────────────────────────────── -->
    <div class="console-toolbar" id="consoleToolbar">
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="console-header">
            <span class="console-title">Output</span>
            <div class="console-controls">
                <button class="console-btn console-toggle-btn" id="consoleDebugToggle"
                        title="Stream Flask server logs into this console">server logs</button>
                <button class="console-btn" id="consoleCopy" title="Copy output to clipboard">
                    <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    Copy
                </button>
                <button class="console-btn" id="consoleClear">Clear</button>
            </div>
        </div>
        <div class="console-content" id="consoleContent"></div>
    </div>

    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
</body>
</html>
