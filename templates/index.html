<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PY-AUTOMATE</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <!-- ── Header ──────────────────────────────────────────────────────── -->
    <header>
        <div class="header-left">
            <div class="logo">PY<span>·</span>AUTOMATE</div>

            <div class="workspace-pill" id="workspaceBtn" title="Click to change workspace">
                <div>
                    <div class="workspace-pill-label">Workspace</div>
                    <div class="workspace-pill-value" id="workspaceDisplay">Loading…</div>
                </div>
                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </div>
        </div>

        <div class="header-right">
            <label class="file-badge" title="Select target file to process">
                <span class="file-badge-label">Target File</span>
                <span class="file-badge-value" id="fileDisplay">No file selected</span>
                <input type="file" id="filePicker" style="display:none">
            </label>

            <div class="btn-divider"></div>

            <button class="run-btn" id="playAll" title="Run sequence (active steps only)">
                <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                Run
            </button>
        </div>
    </header>

    <!-- ── Toolbar strip ───────────────────────────────────────────────── -->
    <div class="toolbar-strip">
        <span class="toolbar-label">Sequence</span>

        <button class="tb-btn" id="undoBtn" title="Undo (Ctrl+Z)" disabled>
            <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l5 5m-5-5l5-5"/>
            </svg>
            Undo
        </button>
        <button class="tb-btn" id="redoBtn" title="Redo (Ctrl+Y)" disabled>
            <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="transform:scaleX(-1)">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l5 5m-5-5l5-5"/>
            </svg>
            Redo
        </button>

        <div class="btn-divider"></div>

        <button class="tb-btn" id="saveBtn" title="Save (Ctrl+S)">
            <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
            </svg>
            Save
        </button>
        <button class="tb-btn" id="saveAsBtn" title="Save As (Ctrl+Shift+S)">
            <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            Save As
        </button>
        <button class="tb-btn" id="loadSeqBtn" title="Load sequence from file">
            <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
            </svg>
            Load
        </button>
        <input type="file" id="seqFilePicker" accept=".json" style="display:none">

        <!-- Save-As inline bar (hidden until triggered) -->
        <div class="saveas-bar" id="saveAsBar">
            <input class="saveas-input" id="saveAsInput" type="text" placeholder="filename.json">
            <button class="saveas-confirm" id="saveAsConfirm">Save</button>
            <button class="saveas-cancel" id="saveAsCancel">Cancel</button>
        </div>

        <span class="seq-filename" id="seqFilename">unsaved</span>
    </div>

    <!-- ── Main ────────────────────────────────────────────────────────── -->
    <main>
        <div class="main-inner">
            <div class="section-header">
                <span class="section-title">Processing Steps</span>
                <span class="section-hint">Drag to reorder · uncheck to skip</span>
            </div>

            <ul id="scriptList"></ul>

            <div id="emptyState" class="empty-state">
                <div class="empty-state-icon">⬡</div>
                No steps yet. Add a plugin below to begin.
            </div>

            <!-- Add step + inline plugin dropdown -->
            <div class="add-step-wrap">
                <button id="add-global-step">
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Add Processing Step
                </button>

                <div class="plugin-dropdown" id="pluginDropdown">
                    <div class="plugin-search-wrap">
                        <input class="plugin-search" id="pluginSearch" type="text" placeholder="Search plugins…" autocomplete="off">
                    </div>
                    <ul class="plugin-list" id="pluginList"></ul>
                </div>
            </div>
        </div>
    </main>

    <!-- ── Console ─────────────────────────────────────────────────────── -->
    <div class="console-toolbar" id="consoleToolbar">
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="console-header">
            <span class="console-title">Output</span>
            <button class="console-clear" id="consoleClear">Clear</button>
        </div>
        <div class="console-content" id="consoleContent"></div>
    </div>

    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
</body>
</html>
